<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Allocation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🚗 Apartment Parking Allocation</h1>

    <h3>Add Resident</h3>
    <form method="POST">
        <input type="text" name="flat" placeholder="Enter Flat Number" required>
        <input type="text" name="name" placeholder="Enter Resident Name" required>
        <button type="submit" name="action" value="add">Add Resident</button>
    </form>

    <h3>Allocate Parking</h3>
    <form method="POST">
        <input type="number" name="slots" placeholder="Enter Number of Parking Slots" required>
        <button type="submit" name="action" value="allocate">Allocate Parking</button>
    </form>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    {% if allocations %}
    <div class="results">
        <h3>Parking Allocation Results</h3>
        {% for flat, data in allocations.items() %}
            <div class="result-item">
                <strong>Flat {{ flat }}</strong> | {{ data.name }} → <b>{{ data.slot }}</b>
            </div>
        {% endfor %}
    </div>
    {% endif %}
</div>

</body>
</html>
